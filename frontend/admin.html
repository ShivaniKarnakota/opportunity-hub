<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — OpportunityHub</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="glow-bg"></div>

  <!-- Navbar injected by JS -->

  <div class="page-content container">
    <div class="page-header">
      <h1>🛡 Admin <span class="highlight">Dashboard</span></h1>
      <p>Review, approve, or reject submitted opportunities.</p>
    </div>

    <!-- Stats Row -->
    <div class="stats-row" id="statsRow">
      <div class="stat-card accent">
        <div class="stat-label">Total</div>
        <div class="stat-value" id="statTotal">—</div>
      </div>
      <div class="stat-card yellow">
        <div class="stat-label">Pending</div>
        <div class="stat-value" id="statPending">—</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label">Approved</div>
        <div class="stat-value" id="statApproved">—</div>
      </div>
      <div class="stat-card red">
        <div class="stat-label">Rejected</div>
        <div class="stat-value" id="statRejected">—</div>
      </div>
    </div>

    <!-- Tab switcher -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('all', this)">All</button>
      <button class="tab-btn" onclick="switchTab('PENDING', this)">⏳ Pending</button>
      <button class="tab-btn" onclick="switchTab('APPROVED', this)">✓ Approved</button>
      <button class="tab-btn" onclick="switchTab('REJECTED', this)">✕ Rejected</button>
    </div>

    <!-- Search -->
    <div class="filter-bar">
      <input
        type="text"
        class="search-input"
        id="adminSearch"
        placeholder="Search opportunities…"
        oninput="filterAdmin()"
      />
    </div>

    <!-- Grid -->
    <section class="section">
      <div class="section-title">
        Opportunities
        <span class="count" id="adminCount">—</span>
      </div>
      <div class="cards-grid" id="adminGrid">
        <!-- Skeleton -->
        <div class="card" style="height:200px;">
          <div class="skeleton" style="width:55%;height:18px;margin-bottom:10px;"></div>
          <div class="skeleton" style="width:40%;height:13px;margin-bottom:18px;"></div>
          <div class="skeleton" style="width:100%;height:12px;margin-bottom:8px;"></div>
          <div class="skeleton" style="width:75%;height:12px;"></div>
        </div>
      </div>
    </section>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
